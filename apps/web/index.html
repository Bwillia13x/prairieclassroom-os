<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PrairieClassroom OS is a local-first classroom complexity copilot for Alberta K-6 teachers." />
    <meta property="og:title" content="PrairieClassroom OS" />
    <meta property="og:description" content="Local-first classroom complexity copilot for Alberta K-6 teachers." />
    <meta property="og:image" content="/brand/og-preview.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrairieClassroom OS" />
    <meta name="twitter:description" content="Local-first classroom complexity copilot for Alberta K-6 teachers." />
    <meta name="twitter:image" content="/brand/og-preview.png" />
    <!-- Typography is self-hosted — see apps/web/src/styles/fonts.css.
         Preload the Inter variable body face so first meaningful paint has
         real type rather than system fallback; the other faces swap in as
         their first glyph is needed (font-display: swap). -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-variable.woff2" crossorigin />
    <title>PrairieClassroom OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme before first paint to prevent flash
      try{var t=localStorage.getItem('prairie-theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t)}catch(e){}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
